app-id: io.github.doukutsu_rs.doukutsu-rs
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: doukutsu-rs
finish-args:
  - --device=all
  - --filesystem=xdg-run/app/com.discordapp.Discord:create
  - --share=ipc
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --socket=wayland
cleanup:
  - /share/applications/mimeinfo.cache
  - /share/icons/hicolor/icon-theme.cache
  - '*.la'
  - '*.a'
modules:
  - name: doukutsu-rs
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/doukutsu-rs/cargo
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release --verbose
      - install -Dpm0644 -t "${FLATPAK_DEST}/share/applications/" "res/flatpak/${FLATPAK_ID}.desktop"
      - install -Dpm0644 -t "${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/" "res/flatpak/${FLATPAK_ID}.png"
      - install -Dpm0644 -t "${FLATPAK_DEST}/share/metainfo/" "res/flatpak/${FLATPAK_ID}.metainfo.xml"
      - install -Dpm0755 -t "${FLATPAK_DEST}/bin/" doukutsu-rs apply_extra
      - install -Dpm0755 ./target/release/doukutsu-rs "${FLATPAK_DEST}/bin/doukutsu-rs-binary"
    sources:
      - type: git
        url: https://github.com/doukutsu-rs/doukutsu-rs
        commit: 37aa3f36aac72dcf75cb82cb1e96d87bdc4fe8f5
      # FIXME: Revert to beta(s) once beta8 is released!
      # - type: archive
      #   archive-type: tar-gzip
      #   url: https://api.github.com/repos/doukutsu-rs/doukutsu-rs/tarball/0.102.0-beta7
      #   sha256: 32be4ac5a3508f09d4973fd0fa380bc926cde7b3769fe0fc0294f697ee34268e
      #   x-checker-data:
      #     type: json
      #     url: https://api.github.com/repos/doukutsu-rs/doukutsu-rs/releases/latest
      #     version-query: .tag_name | sub("^v"; "")
      #     timestamp-query: .published_at
      #     url-query: .tarball_url
      - cargo-sources-doukutsu.json
      - type: extra-data
        filename: cavestoryen.zip
        url: https://www.cavestory.org/downloads/cavestoryen.zip
        sha256: aa87fa30bee9b4980640c7e104791354e0f1f6411ee0d45a70af70046aa0685f
        size: 1136575
      - type: script
        dest-filename: apply_extra
        commands:
          - |
            unzip -n cavestoryen.zip CaveStory/data/* CaveStory/Doukutsu.exe
            mv CaveStory/data /app/extra/data
            mv CaveStory/Doukutsu.exe .
            vanilla-extractor
            rm -rf CaveStory cavestoryen.zip Doukutsu.exe
      - type: script
        dest-filename: doukutsu-rs
        commands:
          - |
            export CAVESTORY_DATA_DIR="${FORCE_CAVESTORY_DATA_DIR:-/app/extra/data}"
            mkdir -p "${XDG_DATA_HOME}/doukutsu-rs/data"
            if [ ! -n "$(find "${XDG_DATA_HOME}/doukutsu-rs/data" -prune -empty 2>/dev/null)" ] ; then
              export CAVESTORY_DATA_DIR="${XDG_DATA_HOME}/doukutsu-rs/data"
            fi
            exec doukutsu-rs-binary "${@}"
    modules:
      - name: vanilla-extractor
        buildsystem: simple
        build-options:
          append-path: /usr/lib/sdk/rust-stable/bin
          env:
            CARGO_HOME: /run/build/vanilla-extractor/cargo
        build-commands:
          - cargo --offline fetch --manifest-path Cargo.toml --verbose
          - cargo --offline build --release --verbose
          - install -Dpm0755 -t "${FLATPAK_DEST}/bin/" ./target/release/vanilla-extractor
        sources:
          - type: archive
            url: https://api.github.com/repos/doukutsu-rs/vanilla-extractor/tarball/v1.0.2
            archive-type: tar-gzip
            sha256: 7672d90d48c6e2fae2edf57b59fa5b03432bd9f992297834a60c55147e6e39b3
            x-checker-data:
              type: json
              url: https://api.github.com/repos/doukutsu-rs/vanilla-extractor/releases/latest
              version-query: .tag_name | sub("^v"; "")
              timestamp-query: .published_at
              url-query: .tarball_url
          - cargo-sources-vanilla-extractor.json
